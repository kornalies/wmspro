name: CI

on:
  push:
    branches: [ main, release ]
  pull_request:
    branches: [ main, release ]

jobs:
  strict-ci-gate:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      JWT_SECRET: ci-jwt-secret
      DATABASE_URL: postgresql://wms:wms@localhost:5432/wms_test?sslmode=disable
      WMS_COMPANY_CODE: GWU
      # ONLY FOR EPHEMERAL CI DB. NEVER reuse outside this isolated CI database.
      WMS_USERNAME: wms_ci
      WMS_PASSWORD: wms_ci_password
      WMS_API_BASE_URL: http://localhost:3000/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate CI environment variables
        run: npm run ci:validate-env

      - name: Auth Domain Guard
        run: npm run ci:auth-domain-guard

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
