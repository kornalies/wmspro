name: CI

on:
  push:
    branches: [ main, release ]
  pull_request:
    branches: [ main, release ]

jobs:
  strict-ci-gate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wms
          POSTGRES_PASSWORD: wms
          POSTGRES_DB: wms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U wms -d wms_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      NODE_ENV: test
      JWT_SECRET: ci-jwt-secret
      DATABASE_URL: postgresql://wms:wms@localhost:5432/wms_test?sslmode=disable
      WMS_COMPANY_CODE: GWU
      # ONLY FOR EPHEMERAL CI DB. NEVER reuse outside this isolated CI database.
      WMS_USERNAME: wms_ci
      WMS_PASSWORD: wms_ci_password
      WMS_API_BASE_URL: http://localhost:3000/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate CI environment variables
        run: npm run ci:validate-env

      - name: Web quality gate (lint + contract + isolation)
        run: npm run quality:gate:web

      - name: Build
        run: npm run build

      - name: Run DB migrations
        run: npm run db:migrate

      - name: Seed DB
        run: npm run db:seed

      - name: Start app in background
        run: |
          npm run start -- --port 3000 > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/api/health >/dev/null; then
              echo "Health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after 60s"
          cat /tmp/app.log || true
          exit 1

      - name: Resilience stress tests
        run: npm run test:resilience

      - name: Tenant safety check
        run: npm run check:tenant-safety
        env:
          DATABASE_URL: postgresql://wms_app:wms_app@localhost:5432/wms_test?sslmode=disable

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/app.pid ]; then
            kill "$(cat /tmp/app.pid)" || true
          fi
