name: Deploy Staging

on:
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate staging deployment environment
        shell: bash
        env:
          DEPLOY_ENV: staging
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          APP_URL: ${{ secrets.STAGING_APP_URL }}
          WMS_API_BASE_URL: ${{ secrets.STAGING_WMS_API_BASE_URL }}
          WMS_COMPANY_CODE: ${{ secrets.STAGING_WMS_COMPANY_CODE }}
          WMS_USERNAME: ${{ secrets.STAGING_WMS_USERNAME }}
          WMS_PASSWORD: ${{ secrets.STAGING_WMS_PASSWORD }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_APP_DIR: ${{ secrets.STAGING_APP_DIR }}
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          npm run ci:validate-env
          for key in STAGING_HOST STAGING_USER STAGING_APP_DIR STAGING_SSH_PRIVATE_KEY; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required staging secret: ${key}"
              exit 1
            fi
          done

      - name: Setup SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.STAGING_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on staging server
        shell: bash
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_APP_DIR: ${{ secrets.STAGING_APP_DIR }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          ssh "${STAGING_USER}@${STAGING_HOST}" <<EOF
          set -euo pipefail
          cd "${STAGING_APP_DIR}"
          git fetch --all --tags
          git checkout "${TARGET_SHA}"
          npm ci
          set -a
          source .env.production
          set +a
          DEPLOY_ENV=staging npm run ci:validate-env
          npm run db:migrate
          npx next build
          sudo systemctl restart wmspro
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
              echo "Health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after restart"
          systemctl status wmspro --no-pager || true
          exit 1
          EOF
