name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to deploy (tag/branch/commit)"
        required: true
        default: "main"
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - name: Setup SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output=/tmp/wmspro-release.tar.gz HEAD

      - name: Upload release archive
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          scp /tmp/wmspro-release.tar.gz "${PROD_USER}@${PROD_HOST}:/tmp/wmspro-release-${GITHUB_RUN_ID}.tar.gz"

      - name: Deploy on production server
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
          DEPLOY_REF: ${{ inputs.git_ref }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          DEPLOY_SHA="$(git rev-parse HEAD)"
          ssh "${PROD_USER}@${PROD_HOST}" <<EOF
          set -euo pipefail
          RELEASE_ROOT="/opt/wmspro/releases"
          BACKUP_ROOT="/opt/wmspro/backups"
          ARCHIVE="/tmp/wmspro-release-${GITHUB_RUN_ID}.tar.gz"
          RELEASE_ID="$(date -u +%Y%m%d-%H%M%S)-${DEPLOY_SHA:0:7}"
          RELEASE_DIR="\${RELEASE_ROOT}/\${RELEASE_ID}"
          mkdir -p "\${RELEASE_ROOT}" "\${BACKUP_ROOT}" "\${RELEASE_DIR}"
          tar -xzf "\${ARCHIVE}" -C "\${RELEASE_DIR}"
          rm -f "\${ARCHIVE}"
          if [ -f "${PROD_APP_DIR}/.env.production" ]; then
            cp "${PROD_APP_DIR}/.env.production" "\${RELEASE_DIR}/.env.production"
          else
            echo "Missing ${PROD_APP_DIR}/.env.production"
            exit 1
          fi
          chown -R wms:wms "\${RELEASE_DIR}"
          cd "\${RELEASE_DIR}"
          npm ci
          set -a
          source .env.production
          set +a
          npm run db:migrate
          npm run build
          if [ -e "${PROD_APP_DIR}" ] && [ ! -L "${PROD_APP_DIR}" ]; then
            mv "${PROD_APP_DIR}" "\${BACKUP_ROOT}/current-before-\${RELEASE_ID}"
          fi
          ln -sfn "\${RELEASE_DIR}" "${PROD_APP_DIR}"
          sudo systemctl restart wmspro
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
              echo "Health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after restart"
          systemctl status wmspro --no-pager || true
          exit 1
          EOF

      - name: Create production release tag
        id: tag_release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          TAG_NAME="prod-$(date -u +%Y%m%d-%H%M%S)-${SHORT_SHA}-r${GITHUB_RUN_NUMBER}"
          git tag -a "${TAG_NAME}" -m "Production deploy ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          git push origin "refs/tags/${TAG_NAME}"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Publish rollback summary
        shell: bash
        env:
          TAG_NAME: ${{ steps.tag_release.outputs.tag_name }}
        run: |
          {
            echo "## Production Deployment Summary"
            echo ""
            echo "- Repository: \`${GITHUB_REPOSITORY}\`"
            echo "- Deployed ref: \`${{ inputs.git_ref }}\`"
            echo "- Deployed commit: \`$(git rev-parse HEAD)\`"
            echo "- Release tag: \`${TAG_NAME}\`"
            echo ""
            echo "### Rollback SOP"
            echo "1. Open **Actions -> Rollback Production**"
            echo "2. Enter \`rollback_ref\` as previous release tag"
            echo "3. Run workflow and verify \`/api/health\`"
          } >> "$GITHUB_STEP_SUMMARY"
